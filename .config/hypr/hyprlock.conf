background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = $TIME
    font_size = 160
    font_family = Satoshi Variable
    font_weight = 500
    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%d, %B, %Y')"
    font_size = 30
    font_family = Satoshi Variable
    font_weight = 300
    position = 0, -15
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    rounding = 10
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(255, 255, 0)
    placeholder_text = <span foreground="##ffffff80">Password...?</span>
    position = 0, -77
    halign = center
    valign = center
    font_family = Satoshi Variable

    # Fade animation
    fade_timeout = 2000
}

label {
    monitor =
    text = cmd[update:1000] echo "Battery = $(cat /sys/class/power_supply/BAT0/capacity)%"
    font_size = 22
    font_family = Satoshi Variable
    font_weight = 0
    position = -10, 10
    halign = right
    valign = bottom
}
