# Hyprland Configuration
monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################
$terminal = konsole
$fileManager = dolphin
$menu = rofi -show drun
#####################
layerrule = blur, eww
layerrule = blur, gtk-layer-shell
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorealpha 0, notifications
layerrule = blur, volume-popup
layerrule = ignorezero, volume-popup
layerrule = blur, brightness-popup
layerrule = ignorezero, brightness-popup
layerrule = blur, bt-popup
layerrule = ignorezero, bt-popup
layerrule = blur, wifi-popup
layerrule = ignorezero, wifi-popup
layerrule = blur, bar-window
layerrule = ignorealpha 0.05, bar-window
layerrule = blur, top-bar-window
layerrule = ignorealpha 0.05, top-bar-window
layerrule = blur, battery-popup
layerrule = ignorealpha 0.05, battery-popup
layerrule = blur, shortcuts-window
layerrule = ignorealpha 0.1, shortcuts-window
layerrule = blur, commands-window
layerrule = ignorealpha 0.1, commands-window
layerrule = blur, music-popup
layerrule = animation slide bottom, music-popup
layerrule = ignorealpha 0.1, music-popup
layerrule = blur, calendar-popup
layerrule = animation slide bottom, calendar-popup
layerrule = ignorezero, calendar-popup
layerrule = ignorealpha 0.1, calendar-popup
layerrule = noanim, selection
#################
### AUTOSTART ###
#################
#exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = /home/rohan/.config/hypr/shellwrapper.sh
exec-once = /home/rohan/.config/hypr/autoplay.sh
exec-once = pkill cava; rm -f /tmp/cava.fifo; mkfifo /tmp/cava.fifo; cava -p ~/.config/cava/config
#exec-once = swaybg -i $WALLPAPER -m fill
exec-once = kdeconnectd
exec-once = kded
exec-once = kglobalaccel6
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator
exec-once = bash ~/.config/eww/popup-monitor.sh
exec-once = bash ~/.config/eww/player-daemon.sh
exec-once = bash ~/.config/eww/player-start.sh &
exec-once = playerctld
#exec-once = flatpak run me.timschneeberger.jdsp4linux
#exec-once = dunst
#############################
### ENVIRONMENT VARIABLES ###
#############################
xwayland {
  force_zero_scaling = true
}

misc:vfr = true
env = XCURSOR_SIZE,18
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,18
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

###################
### PERMISSIONS ###
###################
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
 #   col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
 #   col.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = true
    layout = dwindle
}
source = ~/.cache/wal/hyprland-colours.conf
decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.1696
        special = true
        popups = true
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 2.5, easeOutQuint
    animation = fadeOut, 1, 2, easeInOutCubic
    animation = fade, 1, 2, quick
    animation = layersIn, 1, 2.5, easeOutQuint, slide
    animation = layersOut, 1, 2, easeOutQuint, slide
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
windowrule = rounding 0, floating:0, onworkspace:w[tv1]
windowrule = bordersize 0, floating:0, onworkspace:f[1]
windowrule = rounding 0, floating:0, onworkspace:f[1]

dwindle {
    pseudotile = false
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

plugin = /usr/lib64/hyprland/libhyprexpo.so
plugin {
 #   hyprtasking {
 #       layout = grid
 #       gap_size = 20
 #       bg_color = 0xff000000
 #       border_size = 2
 #       exit_on_hovered = false
 #       warp_on_move_window = 1
 #       close_overview_on_reload = true

 #       drag_button = 0x110
 #       select_button = 0x111

 #       gestures {
 #           enabled = false
 #       }

 #       grid {
 #           rows = 3
 #           cols = 3
 #           loop = false
 #           gaps_use_aspect_ratio = false
 #       }
 #   }
    # .config/hypr/hyprland.conf
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1
        enable_gesture = false
        gesture_distance = 300 # how far is the "max" for the gesture
    }

}


#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gestures {
  gesture = 3, horizontal, workspace
  gesture = 3, down, mod: ALT, close
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER
# bind = , Escape, exec, bash ~/.config/eww/close-popups.sh
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/toggle-bar.sh
bind = ALT, tab, hyprexpo:expo, toggle
bind = ALT_L, M, exec, ~/.config/hypr/toggle_touchpad.sh
bind = $mainMod, escape, exec, ~/.config/rofi/powermenu.sh
bind = $mainMod SHIFT_L, escape, exec, ~/.config/hypr/schedule_action.sh
bind = ALT SHIFT, S, exec, hyprctl keyword monitor "eDP-1,1920x1080@60.05,0x0,1.5" ; hyprctl keyword monitor "HDMI-A-1,disable" ; killall -9 eww 2>/dev/null ; eww daemon ; eww open bar-window && eww open top-bar-window ; killall -9 dunst 2>/dev/null ; dunst &
bind = ALT, S, exec, /home/rohan/.config/hypr/hdmi.sh
bind = ALT, R, exec, killall -9 eww 2>/dev/null ; eww daemon && sleep 0.5; eww open bar-window ; killall -9 dunst 2>/dev/null ; dunst &
bind = ALT, V, exec, ~/.config/hypr/vnc.sh
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/wallpaper_switcher.sh
bindl = ALT_L, N, exec, playerctl next && notify-send -h string:x-dunst-stack-tag:music-now-playing "Now Playing" "$CURRENT"
bindl = ALT_L, P, exec, playerctl previous && notify-send -h string:x-dunst-stack-tag:music-now-playing "Now Playing" "$CURRENT"
bind = $mainMod, A, exec, eww open commands-window --toggle
bind = $mainMod, W, exec, eww open shortcuts-window --toggle
bind = $mainMod, L, exec, hyprlock & ~/.config/hypr/autosuspend.sh
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
#bind = $mainMod, P, pseudo,
bind = $mainMod, P, exec, cliphist list | rofi -dmenu -config ~/.config/rofi/config-history.rasi | cliphist decode | wl-copy
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, N, movetoworkspace, special:minimized
bind = $mainMod SHIFT, N, togglespecialworkspace, minimized
bind = $mainMod, S, exec, sleep 0.2 && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot saved."
bind = $mainMod, T, exec, ~/.config/hypr/autoplay.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.25 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -r 9991 "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100 "%"}')"
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && notify-send -r 9991 "Volume" "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100 "%"}')"
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+ && notify-send -r 9992 "Brightness" "$(brightnessctl -m | cut -d, -f4)"
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%- && notify-send -r 9992 "Brightness" "$(brightnessctl -m | cut -d, -f4)"

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:1,pinned:0

windowrulev2 = opacity 0.45 override 0.45 override, class:^(dunst)$
